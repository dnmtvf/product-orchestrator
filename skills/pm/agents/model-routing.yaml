guardrails:
  notes:
    - Lead-model selection gate is mandatory before Discovery on all plan routes.
    - Selected profile must persist across sessions until explicitly changed.
    - Full Codex Orchestration must remain usable without Claude MCP.
    - Codex-native orchestrator roles are pinned to gpt-5.4 with xhigh reasoning effort.
    - codex mcp list is necessary but not sufficient for claude-code runtime availability.
    - If plan gate reports discovery_can_start=0, PM must not enter Discovery or any downstream phase.
    - If a required claude-code-mcp role is unavailable under codex-main or claude-main, block the current phase and return control to PM instead of falling back automatically.
    - Main model/runtime selection must propagate to pm_beads_plan_handoff and pm_implement_handoff.
