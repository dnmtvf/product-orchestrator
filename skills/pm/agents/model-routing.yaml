# Model Routing Configuration
# Claude Code + Codex CLI (gpt-5.3-codex) architecture
# This file documents which model each role uses in the orchestrator

# Claude-code roles - spawned via Claude Code native Task tool (subagent_type: default)
# Model is not pinned in repo — inherits from the ambient Claude Code session
claude_code_roles:
  - name: "Project Manager"
    runtime: "claude-code"
    launcher: "native"
    description: "Main orchestrator for PM workflow"

  - name: "Team Lead"
    runtime: "claude-code"
    launcher: "task-tool-default"
    description: "Orchestrates implementation subagents"

  - name: "Librarian"
    runtime: "claude-code"
    launcher: "task-tool-default"
    description: "External docs and research"

  - name: "Researcher"
    runtime: "claude-code"
    launcher: "task-tool-default"
    description: "Complex research questions"

  - name: "Backend Engineer"
    runtime: "claude-code"
    launcher: "task-tool-default"
    description: "Backend implementation"

  - name: "Frontend Engineer"
    runtime: "claude-code"
    launcher: "task-tool-default"
    description: "Frontend implementation"

  - name: "Security Engineer"
    runtime: "claude-code"
    launcher: "task-tool-default"
    description: "Security review and implementation"

  - name: "AGENTS Compliance Reviewer"
    runtime: "claude-code"
    launcher: "task-tool-default"
    description: "Repo rules compliance"

  - name: "Codex Reviewer"
    runtime: "claude-code"
    launcher: "task-tool-default"
    description: "4-layer code review (architecture, syntax, composition, logic)"

  - name: "Manual QA"
    runtime: "claude-code"
    launcher: "task-tool-default"
    description: "Smoke test execution"

  - name: "Task Verification"
    runtime: "claude-code"
    launcher: "task-tool-default"
    description: "Per-task implementation verification"

# Codex-native roles - spawned via codex-worker MCP server
# Model: gpt-5.3-codex at xhigh reasoning effort
codex_native_roles:
  - name: "Senior Engineer"
    model: "gpt-5.3-codex"
    reasoning_effort: "xhigh"
    runtime: "codex-native"
    launcher: "codex-worker-mcp"
    description: "Codebase analysis and feasibility"

  - name: "Smoke Test Planner"
    model: "gpt-5.3-codex"
    reasoning_effort: "xhigh"
    runtime: "codex-native"
    launcher: "codex-worker-mcp"
    description: "Test planning"

  - name: "Alternative PM"
    model: "gpt-5.3-codex"
    reasoning_effort: "xhigh"
    runtime: "codex-native"
    launcher: "codex-worker-mcp"
    description: "Alternative solution analysis"

  - name: "Jazz Reviewer"
    model: "gpt-5.3-codex"
    reasoning_effort: "xhigh"
    runtime: "codex-native"
    launcher: "codex-worker-mcp"
    description: "Critical code review"

# Codex worker MCP server configuration
codex_worker_config:
  model: "gpt-5.3-codex"
  reasoning_effort: "xhigh"
  mcp_server_command: "claude mcp add codex-worker -- codex mcp-server"
  setup_script: "./scripts/setup-codex-user.sh"
  # Note: Lead roles inherit model from the ambient Claude Code session.
  # Codex-native roles use gpt-5.3-codex via the codex-worker MCP server.
