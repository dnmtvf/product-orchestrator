# Model Routing Configuration (runtime-inferred execution-mode aware)
# Policy contract for PM role-to-runtime mapping by execution mode and detected outer runtime.
# pm-command plan gate outputs must remain conformance-aligned with this matrix.

version: 5

policy:
  default_mode: dynamic-cross-runtime
  execution_mode_gate_required_routes:
    - default
    - big-feature
  execution_mode_options:
    dynamic-cross-runtime: Dynamic Cross-Runtime
    main-runtime-only: Main Runtime Only
  runtime_detection:
    fail_closed: true
    codex_positive_markers:
      - CODEX_THREAD_ID
      - CODEX_INTERNAL_ORIGINATOR_OVERRIDE
      - process tree contains codex
    claude_positive_markers:
      - CLAUDECODE
      - CLAUDE_CODE
      - CLAUDE_SESSION_ID
      - process tree contains claude
  main_roles:
    - project_manager
    - team_lead
    - pm_beads_plan_handoff
    - pm_implement_handoff
  phase_entry_requirements:
    - plan gate must emit PLAN_ROUTE_READY and discovery_can_start=1 before Discovery starts
    - dynamic-cross-runtime under codex blocks until claude-code is healthy and executable
    - dynamic-cross-runtime under claude blocks until codex-worker is healthy and codex is executable
    - main-runtime-only remains usable without opposite-provider MCP
  runtime_failure_policy:
    - if outer runtime detection is unresolved or ambiguous, fail closed and persist a runtime detection run
    - if a required opposite-provider MCP path later becomes unavailable under dynamic-cross-runtime, stop the current phase and return control to PM
    - do not auto-fallback blocked routed-runtime phases to the main runtime

runtimes:
  codex-native:
    description: Native Codex subagent execution.
    launcher: spawn_agent
    allowed_agent_types:
      - default
      - explorer
      - worker
    model_source:
      - repo .codex/config.toml
      - ~/.codex/config.toml
      - fallback gpt-5.4 / xhigh

  claude-code-mcp:
    description: External Claude MCP path for roles that must cross from Codex into Claude.
    setup_command: "~/.codex/skills/pm/scripts/setup-global-orchestrator.sh"
    availability_requirements:
      - claude-code MCP server registered and enabled
      - configured command executable in the actual Codex runtime
      - launcher failures such as no supported agent type must block the phase
    model_source:
      - ANTHROPIC_MODEL when set
      - repo .claude/settings.local.json
      - repo .claude/settings.json
      - ~/.claude/settings.json
      - fallback <unpinned>
    invalid_paths:
      - mcp__claude-code__Agent with implicit general-purpose launcher

  claude-native:
    description: Native Claude runtime for roles executed when Claude is the outer orchestrator.
    model_source:
      - ANTHROPIC_MODEL when set
      - repo .claude/settings.local.json
      - repo .claude/settings.json
      - ~/.claude/settings.json
      - fallback <unpinned>

  codex-worker-mcp:
    description: External Codex MCP path for roles that must cross from Claude into Codex.
    setup_command: "claude mcp add codex-worker -- codex mcp-server"
    availability_requirements:
      - codex-worker MCP server registered and enabled in the Claude runtime
      - configured codex command executable in the actual Claude runtime
    model_source:
      - repo .codex/config.toml
      - ~/.codex/config.toml
      - fallback gpt-5.4 / xhigh

execution_modes:
  dynamic-cross-runtime:
    description: Keep main orchestration on the detected outer runtime and use the opposite provider for routed support roles.
    outer_runtime_matrix:
      codex:
        main_runtime: codex-native
        opposite_runtime: claude-code-mcp
        roles:
          project_manager: { class: main, runtime: codex-native, agent_type: default }
          team_lead: { class: main, runtime: codex-native, agent_type: default }
          pm_beads_plan_handoff: { class: main, runtime: codex-native, agent_type: default }
          pm_implement_handoff: { class: main, runtime: codex-native, agent_type: default }
          senior_engineer: { class: sub, runtime: claude-code-mcp, agent_type: explorer }
          librarian: { class: sub, runtime: claude-code-mcp, agent_type: default }
          smoke_test_planner: { class: sub, runtime: claude-code-mcp, agent_type: default }
          alternative_pm: { class: sub, runtime: claude-code-mcp, agent_type: default }
          researcher: { class: sub, runtime: claude-code-mcp, agent_type: default }
          backend_engineer: { class: sub, runtime: codex-native, agent_type: worker }
          frontend_engineer: { class: sub, runtime: codex-native, agent_type: worker }
          security_engineer: { class: sub, runtime: codex-native, agent_type: worker }
          agents_compliance_reviewer: { class: sub, runtime: codex-native, agent_type: default }
          jazz_reviewer: { class: sub, runtime: claude-code-mcp, agent_type: default }
          codex_reviewer: { class: sub, runtime: codex-native, agent_type: default }
          manual_qa: { class: sub, runtime: codex-native, agent_type: default }
          task_verification: { class: sub, runtime: codex-native, agent_type: default }
      claude:
        main_runtime: claude-native
        opposite_runtime: codex-worker-mcp
        roles:
          project_manager: { class: main, runtime: claude-native, agent_type: default }
          team_lead: { class: main, runtime: claude-native, agent_type: default }
          pm_beads_plan_handoff: { class: main, runtime: claude-native, agent_type: default }
          pm_implement_handoff: { class: main, runtime: claude-native, agent_type: default }
          senior_engineer: { class: sub, runtime: codex-worker-mcp, agent_type: explorer }
          librarian: { class: sub, runtime: claude-native, agent_type: default }
          smoke_test_planner: { class: sub, runtime: codex-worker-mcp, agent_type: default }
          alternative_pm: { class: sub, runtime: codex-worker-mcp, agent_type: default }
          researcher: { class: sub, runtime: claude-native, agent_type: default }
          backend_engineer: { class: sub, runtime: claude-native, agent_type: worker }
          frontend_engineer: { class: sub, runtime: claude-native, agent_type: worker }
          security_engineer: { class: sub, runtime: claude-native, agent_type: worker }
          agents_compliance_reviewer: { class: sub, runtime: claude-native, agent_type: default }
          jazz_reviewer: { class: sub, runtime: codex-worker-mcp, agent_type: default }
          codex_reviewer: { class: sub, runtime: claude-native, agent_type: default }
          manual_qa: { class: sub, runtime: claude-native, agent_type: default }
          task_verification: { class: sub, runtime: claude-native, agent_type: default }

  main-runtime-only:
    description: Keep all orchestration, support, review, and QA roles on the detected outer runtime.
    outer_runtime_matrix:
      codex:
        main_runtime: codex-native
        roles:
          project_manager: { class: main, runtime: codex-native, agent_type: default }
          team_lead: { class: main, runtime: codex-native, agent_type: default }
          pm_beads_plan_handoff: { class: main, runtime: codex-native, agent_type: default }
          pm_implement_handoff: { class: main, runtime: codex-native, agent_type: default }
          senior_engineer: { class: sub, runtime: codex-native, agent_type: explorer }
          librarian: { class: sub, runtime: codex-native, agent_type: default }
          smoke_test_planner: { class: sub, runtime: codex-native, agent_type: default }
          alternative_pm: { class: sub, runtime: codex-native, agent_type: default }
          researcher: { class: sub, runtime: codex-native, agent_type: default }
          backend_engineer: { class: sub, runtime: codex-native, agent_type: worker }
          frontend_engineer: { class: sub, runtime: codex-native, agent_type: worker }
          security_engineer: { class: sub, runtime: codex-native, agent_type: worker }
          agents_compliance_reviewer: { class: sub, runtime: codex-native, agent_type: default }
          jazz_reviewer: { class: sub, runtime: codex-native, agent_type: default }
          codex_reviewer: { class: sub, runtime: codex-native, agent_type: default }
          manual_qa: { class: sub, runtime: codex-native, agent_type: default }
          task_verification: { class: sub, runtime: codex-native, agent_type: default }
      claude:
        main_runtime: claude-native
        roles:
          project_manager: { class: main, runtime: claude-native, agent_type: default }
          team_lead: { class: main, runtime: claude-native, agent_type: default }
          pm_beads_plan_handoff: { class: main, runtime: claude-native, agent_type: default }
          pm_implement_handoff: { class: main, runtime: claude-native, agent_type: default }
          senior_engineer: { class: sub, runtime: claude-native, agent_type: explorer }
          librarian: { class: sub, runtime: claude-native, agent_type: default }
          smoke_test_planner: { class: sub, runtime: claude-native, agent_type: default }
          alternative_pm: { class: sub, runtime: claude-native, agent_type: default }
          researcher: { class: sub, runtime: claude-native, agent_type: default }
          backend_engineer: { class: sub, runtime: claude-native, agent_type: worker }
          frontend_engineer: { class: sub, runtime: claude-native, agent_type: worker }
          security_engineer: { class: sub, runtime: claude-native, agent_type: worker }
          agents_compliance_reviewer: { class: sub, runtime: claude-native, agent_type: default }
          jazz_reviewer: { class: sub, runtime: claude-native, agent_type: default }
          codex_reviewer: { class: sub, runtime: claude-native, agent_type: default }
          manual_qa: { class: sub, runtime: claude-native, agent_type: default }
          task_verification: { class: sub, runtime: claude-native, agent_type: default }

guardrails:
  notes:
    - Execution-mode selection gate is mandatory before Discovery on all plan routes.
    - Selected execution mode must persist across sessions until explicitly changed.
    - Outer runtime must be inferred fresh on every plan gate run.
    - Dynamic Cross-Runtime requires the opposite-provider MCP path for routed support roles.
    - Main Runtime Only must remain usable without opposite-provider MCP.
    - If plan gate reports discovery_can_start=0, PM must not enter Discovery or any downstream phase.
    - If a required routed-runtime role is unavailable under dynamic-cross-runtime, block the current phase and return control to PM instead of falling back automatically.
    - Main runtime/model selection must propagate to pm_beads_plan_handoff and pm_implement_handoff.
