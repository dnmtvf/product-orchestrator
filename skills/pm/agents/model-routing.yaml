# Model Routing Configuration (Lead-model aware)
# Policy contract for PM role-to-runtime mapping by lead-model profile.
# pm-command plan gate outputs must remain conformance-aligned with this matrix.

version: 4

policy:
  default_profile: codex-main
  lead_model_gate_required_routes:
    - default
    - big-feature
  lead_model_options:
    full-codex: Full Codex Orchestration
    codex-main: Codex as Main Agent
    claude-main: Claude as Main Orchestrator
  codex_pinning:
    model: gpt-5.4
    reasoning_effort: xhigh
  main_roles:
    - project_manager
    - team_lead
    - pm_beads_plan_handoff
    - pm_implement_handoff
  phase_entry_requirements:
    - plan gate must emit PLAN_ROUTE_READY and discovery_can_start=1 before Discovery starts
    - codex-main with unavailable claude-code blocks and offers fallback to full-codex
    - claude-main with unavailable claude-code blocks until Claude is fixed or the mode changes
  runtime_failure_policy:
    - if a required claude-code-mcp role later becomes unavailable under codex-main or claude-main, stop the current phase and return control to PM
    - do not auto-fallback blocked Claude-dependent phases to codex-native

runtimes:
  codex-native:
    description: Native Codex subagent execution.
    launcher: spawn_agent
    allowed_agent_types:
      - default
      - explorer
      - worker

  claude-code-mcp:
    description: External Claude MCP path for roles/prompt flows that require Claude swarm execution.
    setup_command: "codex mcp add claude-code -- claude mcp serve"
    availability_requirements:
      - claude-code MCP server registered and enabled
      - a required Claude-routed phase must block if the actual Claude invocation reports no supported agent type or equivalent launcher failure
    invalid_paths:
      - mcp__claude-code__Agent with implicit general-purpose launcher

